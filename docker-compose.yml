version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: tms_mysql
    restart: always
    environment:
      MYSQL_DATABASE: tms_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: tms_user
      MYSQL_PASSWORD: tms_password
    ports:
      - "3306:3306"
    volumes:
      - tms_mysql_data:/var/lib/mysql

volumes:
  tms_mysql_data:
